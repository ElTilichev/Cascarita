<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#46eaed",
              "primary-dim": "#ff69a3",
              "tertiary-fixed": "#ff9734",
              "secondary-container": "#00696b",
              "on-secondary": "#005b5d",
              "background": "#0e0e0e",
              "on-error": "#490013",
              "on-secondary-container": "#d9ffff",
              "primary": "#ff88b2",
              "inverse-primary": "#ba0064",
              "surface-container": "#1a1a1a",
              "primary-fixed": "#ff6fa5",
              "secondary-dim": "#46eaed",
              "outline-variant": "#484847",
              "error-dim": "#d73357",
              "surface-variant": "#262626",
              "on-tertiary-fixed": "#291200",
              "tertiary-container": "#fd8b00",
              "outline": "#767575",
              "on-error-container": "#ffb2b9",
              "secondary": "#5af8fb",
              "tertiary-dim": "#ed8200",
              "on-tertiary-fixed-variant": "#5a2e00",
              "surface-container-high": "#20201f",
              "surface-container-lowest": "#000000",
              "surface-bright": "#2c2c2c",
              "on-tertiary": "#532a00",
              "on-primary-container": "#4c0025",
              "surface-container-low": "#131313",
              "on-primary": "#610031",
              "tertiary": "#ff9f4a",
              "primary-container": "#ff6fa5",
              "surface-tint": "#ff88b2",
              "error-container": "#a70138",
              "on-secondary-fixed-variant": "#006668",
              "on-primary-fixed-variant": "#5d002f",
              "on-surface-variant": "#adaaaa",
              "on-secondary-fixed": "#004748",
              "on-surface": "#ffffff",
              "on-tertiary-container": "#442100",
              "inverse-on-surface": "#565555",
              "primary-fixed-dim": "#ff5099",
              "surface-dim": "#0e0e0e",
              "surface": "#0e0e0e",
              "on-primary-fixed": "#000000",
              "error": "#ff6e84",
              "on-background": "#ffffff",
              "secondary-fixed": "#5af8fb",
              "tertiary-fixed-dim": "#f58600",
              "surface-container-highest": "#262626",
              "inverse-surface": "#fcf9f8"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #0e0e0e;
        color: #ffffff;
        font-family: 'Manrope', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#0e0e0e] flex justify-between items-center w-full px-6 py-4 docked full-width top-0 z-50">
<button class="text-[#ff88b2] hover:opacity-80 transition-opacity scale-95 active:transition-transform">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="Headline-LG Noto Serif bold tracking-tight text-2xl font-serif text-[#ff88b2] italic uppercase">CASCARITA</h1>
<div class="w-6"></div> <!-- Spacer for balance -->
</header>
<main class="px-6 pt-4 space-y-8 max-w-2xl mx-auto">
<!-- Scoreboard Section -->
<section class="grid grid-cols-[1fr_auto_1fr] items-center gap-4 pt-6">
<!-- Equipo 1 -->
<div class="bg-surface-container-highest rounded-xl p-6 text-center space-y-4 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-50"></div>
<h2 class="font-headline italic text-on-surface-variant text-sm uppercase tracking-widest relative z-10">Equipo 1</h2>
<div class="font-headline text-7xl md:text-8xl font-bold text-on-surface relative z-10">0</div>
<button class="absolute bottom-2 right-2 text-primary opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
</div>
<!-- VS Separator -->
<div class="flex flex-col items-center gap-2">
<div class="h-12 w-[2px] bg-gradient-to-b from-transparent via-outline-variant to-transparent"></div>
<span class="font-headline italic text-secondary font-bold text-xl px-2">VS</span>
<div class="h-12 w-[2px] bg-gradient-to-b from-outline-variant via-outline-variant to-transparent"></div>
</div>
<!-- Equipo 2 -->
<div class="bg-surface-container-highest rounded-xl p-6 text-center space-y-4 relative overflow-hidden group ring-2 ring-primary/20 shadow-[0_0_40px_rgba(255,136,178,0.15)]">
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent"></div>
<h2 class="font-headline italic text-primary text-sm uppercase tracking-widest relative z-10">Equipo 2</h2>
<div class="font-headline text-7xl md:text-8xl font-bold text-on-surface relative z-10">2</div>
<button class="absolute bottom-2 right-2 text-primary opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
</div>
</section>
<!-- Next Team Banner -->
<section class="relative">
<div class="absolute -top-3 left-6 z-10 bg-tertiary px-3 py-0.5 rounded-full shadow-lg">
<span class="text-[10px] font-bold text-on-tertiary uppercase tracking-tighter">SIGUIENTE EQUIPO</span>
</div>
<div class="bg-surface-container-low border border-outline-variant/20 rounded-xl p-6 flex justify-between items-center overflow-hidden relative">
<div class="absolute inset-0 bg-gradient-to-r from-tertiary/10 to-transparent pointer-events-none"></div>
<div class="flex items-center gap-4 relative z-10">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center border border-tertiary/30">
<span class="material-symbols-outlined text-tertiary" data-icon="sports_volleyball">sports_volleyball</span>
</div>
<div>
<h3 class="font-headline text-2xl font-bold text-on-surface">Equipo 3</h3>
<p class="text-xs font-body text-on-surface-variant uppercase tracking-wider">Esperando cancha</p>
</div>
</div>
<button class="relative z-10 bg-surface-container-highest p-3 rounded-full text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="swap_horiz">swap_horiz</span>
</button>
</div>
</section>
<!-- Queue Section -->
<section class="space-y-4">
<div class="flex justify-between items-end px-2">
<h3 class="font-headline italic text-on-surface-variant uppercase text-sm tracking-widest">En Fila</h3>
<span class="text-[10px] text-outline uppercase">2 Equipos esperando</span>
</div>
<div class="space-y-2">
<!-- Item 1 -->
<div class="bg-surface-container-low rounded-xl p-4 flex justify-between items-center group hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-4">
<span class="font-headline italic text-primary text-xl opacity-60">2</span>
<span class="font-body text-lg font-medium text-on-surface">Equipo 4</span>
</div>
<button class="text-outline-variant group-hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Item 2 -->
<div class="bg-surface-container-lowest rounded-xl p-4 flex justify-between items-center group hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-4">
<span class="font-headline italic text-primary text-xl opacity-60">3</span>
<span class="font-body text-lg font-medium text-on-surface">Equipo 5</span>
</div>
<button class="text-outline-variant group-hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Add FAB (Queue) -->
<div class="flex justify-center pt-2">
<button class="bg-primary-container text-on-primary-container w-14 h-14 rounded-full flex items-center justify-center shadow-[0_8px_30px_rgba(255,111,165,0.3)] hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined scale-125" data-icon="add" style="font-variation-settings: 'wght' 600;">add</span>
</button>
</div>
</section>
<!-- Match Settings -->
<section class="bg-surface-container-high/50 backdrop-blur-md rounded-2xl p-6 flex flex-col items-center gap-4">
<h4 class="font-body text-[10px] font-bold text-secondary uppercase tracking-[0.2em]">Configuración de Juego</h4>
<div class="flex items-center gap-8">
<button class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center text-on-surface-variant active:bg-surface-container-highest">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</button>
<div class="text-center">
<span class="block font-headline text-3xl font-bold text-on-surface">7</span>
<span class="block font-body text-[10px] text-outline uppercase">Puntos</span>
</div>
<button class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center text-on-surface-variant active:bg-surface-container-highest">
<span class="material-symbols-outlined" data-icon="expand_less">expand_less</span>
</button>
</div>
<p class="font-body italic text-sm text-on-surface-variant">Partido a 7 puntos</p>
<button class="mt-4 flex items-center justify-center gap-2 px-6 py-2 border border-error/50 text-error hover:bg-error/10 transition-colors rounded-full text-xs font-bold uppercase tracking-widest">
<span class="material-symbols-outlined text-sm" data-icon="restart_alt">restart_alt</span>
  Reiniciar Todo
</button></section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0e0e0e] docked full-width bottom-0 z-50 rounded-t-2xl shadow-[0_-4px_20px_rgba(255,136,178,0.08)]">
<a class="flex flex-col items-center justify-center bg-[#ff88b2]/10 text-[#ff88b2] rounded-xl px-4 py-2 hover:text-[#ff88b2] transition-colors scale-90 active:duration-150" href="#">
<span class="material-symbols-outlined" data-icon="scoreboard" style="font-variation-settings: 'FILL' 1;">scoreboard</span>
<span class="Body-MD Manrope font-medium tracking-wide uppercase text-[10px]">Marcador</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5af8fb]/60 px-4 py-2 hover:text-[#ff88b2] transition-colors scale-90 active:duration-150" href="#">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="Body-MD Manrope font-medium tracking-wide uppercase text-[10px]">Equipos</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5af8fb]/60 px-4 py-2 hover:text-[#ff88b2] transition-colors scale-90 active:duration-150" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="Body-MD Manrope font-medium tracking-wide uppercase text-[10px]">Historial</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5af8fb]/60 px-4 py-2 hover:text-[#ff88b2] transition-colors scale-90 active:duration-150" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="Body-MD Manrope font-medium tracking-wide uppercase text-[10px]">Ajustes</span>
</a>
</nav>
</body></html>
